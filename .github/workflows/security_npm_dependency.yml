name: Security npm dependency check
on:
  workflow_dispatch:
  schedule:
    - cron: "30 5 * * MON-FRI" # Every weekday

jobs:
  security-npm-dependency-check:
    permissions:
      contents: read
      actions: read
      security-events: write
    name: Project security npm dependency check
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_npm_dependency.yml@658ee37b404f39de63423d2bd7bdf1f2fce7da19 # v2.13.3
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit