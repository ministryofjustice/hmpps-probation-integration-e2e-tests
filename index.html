<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <title>Probation Integration Test Reports</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/purecss@3.0.0/build/base-min.css">
</head>
<body style='margin: 20px'>
<h1>Probation Integration Test Reports</h1>
<p>Use the links below to browse the available end-to-end test reports.</p>
<div id='browser'></div>
<script>
    (async () => {
        const path = new URLSearchParams(window.location.search).get('path') || 'playwright-report/test/main'
        const response = await fetch(`https://api.github.com/repos/ministryofjustice/hmpps-probation-integration-e2e-tests/contents/${path}?ref=gh-pages`)
        const data = await response.json()
        const list = data.map(file => {
            const href = (file.type === 'dir') ? `?path=${file.path}` : file.path
            return `<li><a href='${href}'>${file.path.replace(path, '')}</a></li>`
        }).join('')
        document.getElementById('browser').innerHTML = `<strong>${path}</strong><ul>${list}</ul>`
    })()
</script>
</body>
</html>
